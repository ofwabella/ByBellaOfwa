<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By Bella Ofwa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Public+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bright-white: #FFFFFF;
    --stalactite: #FDFCF0;
    --orange-pepper: #D9790B;
    --pumpkin-spice: #A35608;
    --cendre-blue: #407FA2;
    --jet-black: #000000;
    --mid-gray: #6B6760;
    --light-border: #E8E5DF;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Public Sans', sans-serif;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: var(--font-body);
    background: var(--stalactite);
    color: var(--jet-black);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--stalactite);
    border-bottom: 1px solid var(--light-border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 68px;
  }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--mid-gray); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 400; transition: color 0.2s; }
  .nav-links a:hover { color: var(--jet-black); }
  
  /* NEW BRANDING ALIGNMENT */
  .nav-brand-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .nav-logo-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo-img {
    height: 24px;
    width: auto;
  }
  .nav-logo-text {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--jet-black);
  }
  .nav-tagline {
    font-size: 8px;
    letter-spacing: 0.18em;
    color: var(--mid-gray);
    font-family: var(--font-body);
    font-weight: 300;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .nav-actions { display: flex; align-items: center; gap: 20px; }
  .nav-icon-btn { background: none; border: none; cursor: pointer; color: var(--mid-gray); transition: color 0.2s; display: flex; align-items: center; }
  .nav-icon-btn:hover { color: var(--jet-black); }
  .cart-badge { position: relative; }
  .badge { position: absolute; top: -7px; right: -7px; background: var(--orange-pepper); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); font-weight: 500; }

  /* PAGES */
  .page { display: none; animation: fadeIn 0.35s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* HERO */
  .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 68px); }
  .hero-text { display: flex; flex-direction: column; justify-content: center; padding: 80px 72px; background: var(--stalactite); }
  .hero-eyebrow { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--orange-pepper); font-weight: 400; margin-bottom: 28px; }
  .hero-headline { font-family: var(--font-display); font-size: 78px; line-height: 1.0; font-weight: 300; color: var(--jet-black); margin-bottom: 8px; }
  .hero-headline em { font-style: italic; color: var(--mid-gray); }
  .hero-tagline { font-family: var(--font-display); font-size: 16px; font-style: italic; color: var(--orange-pepper); letter-spacing: 0.04em; margin-bottom: 28px; font-weight: 300; }
  .hero-sub { font-size: 13px; color: var(--mid-gray); line-height: 1.9; max-width: 360px; margin-bottom: 52px; font-weight: 300; }
  .hero-image { background: var(--jet-black); position: relative; overflow: hidden; display: flex; align-items: flex-end; }
  .hero-img-fill { width: 100%; height: 100%; min-height: 520px; background: linear-gradient(155deg, #2A2520 0%, #1A1410 50%, #0D0A08 100%); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .hero-img-fill span { font-family: var(--font-display); font-size: 20px; color: rgba(253,252,240,0.25); font-style: italic; }
  .hero-img-fill small { font-size: 10px; letter-spacing: 0.2em; color: rgba(217,121,11,0.5); text-transform: uppercase; }
  .hero-label { position: absolute; bottom: 32px; left: 32px; background: var(--stalactite); padding: 10px 18px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid-gray); }
  .hero-accent { position: absolute; top: 40px; right: 40px; width: 80px; height: 80px; border: 1px solid rgba(217,121,11,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .hero-accent span { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(217,121,11,0.7); text-align: center; line-height: 1.5; }

  /* BUTTONS */
  .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: var(--jet-black); color: var(--stalactite); border: none; padding: 14px 32px; cursor: pointer; font-family: var(--font-body); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 400; transition: background 0.2s, transform 0.15s; }
  .btn-primary:hover { background: var(--pumpkin-spice); transform: translateY(-1px); }
  .btn-outline { display: inline-flex; align-items: center; gap: 10px; background: transparent; color: var(--jet-black); border: 1px solid var(--jet-black); padding: 14px 32px; cursor: pointer; font-family: var(--font-body); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 400; transition: all 0.2s; }
  .btn-outline:hover { background: var(--jet-black); color: var(--stalactite); }
  .btn-accent { display: inline-flex; align-items: center; gap: 10px; background: var(--orange-pepper); color: var(--bright-white); border: none; padding: 14px 32px; cursor: pointer; font-family: var(--font-body); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 400; transition: background 0.2s; }
  .btn-accent:hover { background: var(--pumpkin-spice); }
  .btn-text { background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid-gray); display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .btn-text:hover { color: var(--orange-pepper); }

  /* MARQUEE */
  .marquee-strip { background: var(--jet-black); color: var(--stalactite); padding: 13px 0; overflow: hidden; white-space: nowrap; }
  .marquee-inner { display: inline-block; animation: marquee 20s linear infinite; }
  .marquee-inner span { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; margin: 0 48px; font-family: var(--font-body); font-weight: 300; }
  .marquee-inner .dot { color: var(--orange-pepper); }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* SECTIONS */
  section { padding: 88px 48px; }
  .section-header { text-align: center; margin-bottom: 60px; }
  .section-eyebrow { font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--orange-pepper); font-weight: 400; margin-bottom: 16px; }
  .section-title { font-family: var(--font-display); font-size: 52px; font-weight: 300; color: var(--jet-black); }
  .section-title em { font-style: italic; color: var(--mid-gray); }

  /* PRODUCT CARDS */
  .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .product-card { cursor: pointer; }
  .product-img { aspect-ratio: 3/4; overflow: hidden; position: relative; margin-bottom: 14px; }
  .product-img-fill { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; transition: transform 0.45s ease; }
  .product-card:hover .product-img-fill { transform: scale(1.04); }
  .product-img-fill span { font-family: var(--font-display); font-size: 13px; font-style: italic; opacity: 0.55; }
  .product-quick-add { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.82); color: var(--stalactite); padding: 11px; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; text-align: center; opacity: 0; transition: opacity 0.25s; border: none; cursor: pointer; font-family: var(--font-body); }
  .product-card:hover .product-quick-add { opacity: 1; }
  .product-name { font-family: var(--font-display); font-size: 18px; font-weight: 400; margin-bottom: 3px; }
  .product-category { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 5px; }
  .product-price { font-size: 13px; color: var(--jet-black); font-weight: 400; }

  /* ADAPTIVE FEATURE STRIP */
  .adaptive-strip { background: var(--jet-black); color: var(--stalactite); padding: 80px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .adaptive-text .eyebrow { font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--orange-pepper); margin-bottom: 20px; }
  .adaptive-headline { font-family: var(--font-display); font-size: 52px; font-weight: 300; line-height: 1.05; margin-bottom: 24px; }
  .adaptive-headline em { font-style: italic; color: rgba(253,252,240,0.45); }
  .adaptive-body { font-size: 13px; line-height: 1.95; color: rgba(253,252,240,0.6); margin-bottom: 32px; }
  .adaptive-values { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 40px; }
  .adaptive-val { padding: 14px 16px; border: 1px solid rgba(217,121,11,0.25); }
  .adaptive-val p { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange-pepper); margin-bottom: 4px; }
  .adaptive-val span { font-family: var(--font-display); font-size: 15px; color: rgba(253,252,240,0.75); font-style: italic; }
  .adaptive-image { aspect-ratio: 4/5; background: linear-gradient(140deg, #1E1B18, #0D0A08); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; border: 1px solid rgba(217,121,11,0.15); }
  .adaptive-image span { font-family: var(--font-display); font-size: 18px; font-style: italic; color: rgba(253,252,240,0.2); }

  /* ABOUT STRIP */
  .about-strip { background: var(--bright-white); padding: 88px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; border-top: 1px solid var(--light-border); border-bottom: 1px solid var(--light-border); }
  .about-image-block { aspect-ratio: 3/4; background: linear-gradient(140deg, #EEECE3, #DEDAD0); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
  .about-image-block span { font-family: var(--font-display); font-size: 16px; font-style: italic; color: var(--mid-gray); }
  .about-quote { font-family: var(--font-display); font-size: 38px; font-weight: 300; line-height: 1.2; color: var(--jet-black); font-style: italic; margin-bottom: 24px; }
  .about-sub { font-size: 13px; line-height: 1.9; color: var(--mid-gray); margin-bottom: 32px; }

  /* PRODUCT DETAIL */
  .pdp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; padding: 64px 80px; align-items: start; }
  .pdp-main-img { aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .pdp-thumb-row { display: flex; gap: 8px; }
  .pdp-thumb { width: 70px; height: 88px; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
  .pdp-thumb.active { border-color: var(--jet-black); }
  .pdp-eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange-pepper); margin-bottom: 14px; }
  .pdp-name { font-family: var(--font-display); font-size: 54px; line-height: 1.0; font-weight: 300; margin-bottom: 8px; }
  .pdp-tagline { font-family: var(--font-display); font-size: 15px; font-style: italic; color: var(--mid-gray); margin-bottom: 20px; }
  .pdp-price { font-size: 20px; font-weight: 400; margin-bottom: 28px; }
